name: Conditional Branch Deletion

on:
  pull_request:
    types: [closed]

jobs:
  delete_branch:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Fetch PR Comments
        id: get_comments
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            const keyword = "@no-delete"

            const hasKeyword = comments.some(comment =>
              commend.body.toLowerCase().includes(keyword.toLowerCase()))
            );

            core.setOutput("delete", hasKeyword ? "false" : "true");

      - name: Delete Head Branch
        if: steps.get_comments.outputs.delete == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const branchName = context.payload.pull_request.head.ref;

            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branchName}`,
              });
              console.log(`Successfully deleted branch: ${branchName}`);
            } catch (error) {
              console.log(`Could not delete branch (it may already be deleted): ${error.message}`);
            }
